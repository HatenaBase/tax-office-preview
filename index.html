<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>税理士事務所HP改修 — プレビュー一覧</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Zen Kaku Gothic New", sans-serif;
      background: #F2F2F2; color: #0E0E14;
      margin: 0; padding: 64px 32px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 {
      font-size: 24px; font-weight: 700; margin-bottom: 8px;
    }
    .subtitle {
      font-family: "Inter", sans-serif; font-size: 12px;
      color: #8A8A93; letter-spacing: .2em; margin-bottom: 48px;
    }
    .card {
      display: block; padding: 24px 28px;
      background: #fff; border: 1px solid #E8E6DF;
      margin-bottom: 12px; text-decoration: none; color: #0E0E14;
      transition: border-color .2s, transform .2s;
    }
    .card:hover { border-color: #1F61AB; transform: translateX(4px); }
    .card__title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
    .card__path {
      font-family: "Inter", sans-serif; font-size: 12px;
      color: #1F61AB; letter-spacing: .02em;
    }
    .card__status {
      font-size: 12px; color: #8A8A93; margin-top: 4px;
    }
    .note {
      margin-top: 48px; font-size: 13px; color: #8A8A93; line-height: 1.8;
    }
  </style>
</head>

  <div class="container">
